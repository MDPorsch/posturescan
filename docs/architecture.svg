<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <title>PostureScan architecture</title>
  <desc>Layered architecture: users, Vercel frontend, Railway backend, Supabase, target sites, GitHub and Sentry sidecars.</desc>
  <style>
    .label-bold { font-size: 14px; font-weight: 600; }
    .label      { font-size: 14px; font-weight: 500; }
    .label-sm   { font-size: 12px; font-weight: 400; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Users tier -->
  <rect x="160" y="20" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="label" x="245" y="42" text-anchor="middle" fill="#2C2C2A">Guest visitor</text>
  <text class="label-sm" x="245" y="58" text-anchor="middle" fill="#5F5E5A">Anonymous, rate-limited</text>

  <rect x="350" y="20" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="label" x="435" y="42" text-anchor="middle" fill="#2C2C2A">Authenticated user</text>
  <text class="label-sm" x="435" y="58" text-anchor="middle" fill="#5F5E5A">JWT, tracks domains</text>

  <line x1="245" y1="64" x2="245" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="435" y1="64" x2="435" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Frontend container (Vercel) -->
  <rect x="60" y="100" width="560" height="100" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="label-bold" x="340" y="124" text-anchor="middle" fill="#085041">Vercel · React + Vite SPA</text>

  <rect x="100" y="140" width="220" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="210" y="162" text-anchor="middle" fill="#3C3489">Production</text>
  <text class="label-sm" x="210" y="178" text-anchor="middle" fill="#534AB7">main · posturescan.vercel.app</text>

  <rect x="360" y="140" width="220" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="470" y="162" text-anchor="middle" fill="#3C3489">Preview</text>
  <text class="label-sm" x="470" y="178" text-anchor="middle" fill="#534AB7">staging · git-staging-*.vercel.app</text>

  <line x1="210" y1="200" x2="210" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="200" x2="470" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label-sm" x="340" y="222" text-anchor="middle" fill="#5F5E5A">REST + JWT</text>

  <!-- Backend container (Railway) -->
  <rect x="60" y="236" width="560" height="140" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="label-bold" x="340" y="260" text-anchor="middle" fill="#712B13">Railway · Django + DRF</text>

  <rect x="100" y="276" width="220" height="84" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="210" y="298" text-anchor="middle" fill="#3C3489">backend-prod</text>
  <text class="label-sm" x="210" y="316" text-anchor="middle" fill="#534AB7">main branch</text>
  <text class="label-sm" x="210" y="334" text-anchor="middle" fill="#534AB7">apps: accounts, domains,</text>
  <text class="label-sm" x="210" y="350" text-anchor="middle" fill="#534AB7">scans, public, engine</text>

  <rect x="360" y="276" width="220" height="84" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="470" y="298" text-anchor="middle" fill="#3C3489">backend-staging</text>
  <text class="label-sm" x="470" y="316" text-anchor="middle" fill="#534AB7">staging branch</text>
  <text class="label-sm" x="470" y="334" text-anchor="middle" fill="#534AB7">same apps,</text>
  <text class="label-sm" x="470" y="350" text-anchor="middle" fill="#534AB7">staging settings</text>

  <line x1="170" y1="376" x2="170" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label-sm" x="120" y="402" text-anchor="middle" fill="#5F5E5A">SQL</text>
  <line x1="510" y1="376" x2="510" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label-sm" x="570" y="402" text-anchor="middle" fill="#5F5E5A">TLS · HTTP · DNS</text>

  <!-- Data layer + targets -->
  <rect x="60" y="420" width="260" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="label-bold" x="190" y="448" text-anchor="middle" fill="#085041">Supabase · PostgreSQL</text>
  <text class="label-sm" x="190" y="468" text-anchor="middle" fill="#0F6E56">Shared across staging + prod</text>
  <text class="label-sm" x="190" y="486" text-anchor="middle" fill="#0F6E56">Users · domains · scans · results</text>

  <rect x="360" y="420" width="260" height="80" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="label-bold" x="490" y="448" text-anchor="middle" fill="#633806">Target websites</text>
  <text class="label-sm" x="490" y="468" text-anchor="middle" fill="#854F0B">Probed read-only by engine</text>
  <text class="label-sm" x="490" y="486" text-anchor="middle" fill="#854F0B">SSRF guard blocks private IPs</text>

  <!-- Sidecar: GitHub + Sentry -->
  <rect x="60" y="540" width="260" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="label-bold" x="190" y="564" text-anchor="middle" fill="#2C2C2A">GitHub</text>
  <text class="label-sm" x="190" y="582" text-anchor="middle" fill="#5F5E5A">Source · Actions tests · auto-deploy</text>

  <rect x="360" y="540" width="260" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="label-bold" x="490" y="564" text-anchor="middle" fill="#2C2C2A">Sentry</text>
  <text class="label-sm" x="490" y="582" text-anchor="middle" fill="#5F5E5A">Error capture · frontend + backend</text>

  <line x1="190" y1="540" x2="190" y2="500" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="490" y1="540" x2="490" y2="500" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>
